<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Desktop mockup frame -->
  <rect x="40" y="20" width="400" height="260" rx="12" fill="#3a3836" />
  <rect x="40" y="20" width="400" height="28" rx="12" fill="#3a3836" />
  <rect x="40" y="44" width="400" height="236" fill="#f5f3ef" />
  <!-- Window dots -->
  <circle cx="60" cy="34" r="4" fill="#d4622b" />
  <circle cx="74" cy="34" r="4" fill="#928e8a" />
  <circle cx="88" cy="34" r="4" fill="#928e8a" />
  <!-- Stat cards top row -->
  <rect x="64" y="58" width="100" height="50" rx="6" fill="white" />
  <rect x="76" y="68" width="40" height="8" rx="3" fill="#928e8a" opacity="0.3" />
  <rect x="76" y="82" width="60" height="12" rx="3" fill="#d4622b" opacity="0.8" />
  <rect x="180" y="58" width="100" height="50" rx="6" fill="white" />
  <rect x="192" y="68" width="40" height="8" rx="3" fill="#928e8a" opacity="0.3" />
  <rect x="192" y="82" width="60" height="12" rx="3" fill="#3a3836" opacity="0.25" />
  <rect x="296" y="58" width="100" height="50" rx="6" fill="white" />
  <rect x="308" y="68" width="40" height="8" rx="3" fill="#928e8a" opacity="0.3" />
  <rect x="308" y="82" width="60" height="12" rx="3" fill="#d4622b" opacity="0.5" />
  <!-- Line chart area -->
  <rect x="64" y="120" width="232" height="140" rx="6" fill="white" />
  <!-- Grid lines -->
  <line x1="80" y1="150" x2="280" y2="150" stroke="#928e8a" stroke-width="0.5" opacity="0.15" />
  <line x1="80" y1="180" x2="280" y2="180" stroke="#928e8a" stroke-width="0.5" opacity="0.15" />
  <line x1="80" y1="210" x2="280" y2="210" stroke="#928e8a" stroke-width="0.5" opacity="0.15" />
  <!-- Line chart path -->
  <polyline points="80,220 120,200 160,185 200,170 240,150 280,140" stroke="#d4622b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <polyline points="80,215 120,210 160,195 200,195 240,185 280,180" stroke="#928e8a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
  <!-- Donut chart -->
  <rect x="312" y="120" width="108" height="140" rx="6" fill="white" />
  <circle cx="366" cy="182" r="36" stroke="#d4622b" stroke-width="8" fill="none" opacity="0.8" stroke-dasharray="160 226" />
  <circle cx="366" cy="182" r="36" stroke="#928e8a" stroke-width="8" fill="none" opacity="0.3" stroke-dasharray="66 226" stroke-dashoffset="-160" />
  <rect x="336" y="232" width="60" height="6" rx="2" fill="#928e8a" opacity="0.2" />
</svg>
