<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Desktop mockup frame -->
  <rect x="40" y="20" width="400" height="260" rx="12" fill="#3a3836" />
  <rect x="40" y="20" width="400" height="28" rx="12" fill="#3a3836" />
  <rect x="40" y="44" width="400" height="236" fill="#f5f3ef" />
  <!-- Window dots -->
  <circle cx="60" cy="34" r="4" fill="#d4622b" />
  <circle cx="74" cy="34" r="4" fill="#928e8a" />
  <circle cx="88" cy="34" r="4" fill="#928e8a" />
  <!-- Budget bar chart -->
  <rect x="72" y="180" width="40" height="80" rx="4" fill="#d4622b" opacity="0.9" />
  <rect x="128" y="140" width="40" height="120" rx="4" fill="#d4622b" opacity="0.7" />
  <rect x="184" y="100" width="40" height="160" rx="4" fill="#d4622b" opacity="0.5" />
  <rect x="240" y="120" width="40" height="140" rx="4" fill="#3a3836" opacity="0.2" />
  <rect x="296" y="160" width="40" height="100" rx="4" fill="#3a3836" opacity="0.2" />
  <rect x="352" y="80" width="40" height="180" rx="4" fill="#3a3836" opacity="0.15" />
  <!-- Budget line -->
  <line x1="60" y1="130" x2="420" y2="130" stroke="#d4622b" stroke-width="2" stroke-dasharray="6 4" opacity="0.6" />
  <!-- Header bars -->
  <rect x="72" y="60" width="120" height="10" rx="3" fill="#3a3836" opacity="0.15" />
  <rect x="72" y="76" width="80" height="8" rx="3" fill="#928e8a" opacity="0.3" />
  <!-- Bottom base line -->
  <line x1="60" y1="264" x2="420" y2="264" stroke="#928e8a" stroke-width="1" opacity="0.3" />
</svg>
